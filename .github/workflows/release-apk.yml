name: Build Release APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Get latest release version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(gh release view --json tagName -q .tagName)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set SOURCE_DATE_EPOCH
        run: |
          # Derive build timestamp from the release tag's commit time
          TAG="${{ steps.get_version.outputs.VERSION }}"
          COMMIT="$(git rev-list -n 1 "$TAG")"
          EPOCH="$(git show -s --format=%ct "$COMMIT")"
          echo "Using tag '$TAG' commit timestamp: $EPOCH"
          echo "SOURCE_DATE_EPOCH=$EPOCH" >> $GITHUB_ENV
          echo "Using SOURCE_DATE_EPOCH=$EPOCH"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV

      - name: Build web assets
        run: bun run build:github

      - name: Sync to Android (Capacitor)
        run: bunx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: |
          echo "keystore.file=/tmp/keystore.jks" > android/local.properties
          echo "keystore.password=${{ secrets.KEYSTORE_PASSWORD }}" >> android/local.properties
          echo "keystore.key.alias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
          echo "keystore.key.password=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/keystore.jks

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew clean assembleRelease -PsourceDateEpoch="$SOURCE_DATE_EPOCH" --stacktrace

      - name: Rename APK
        run: |
          cd android/app/build/outputs/apk/release
          mv app-release.apk muajjin-${{ steps.get_version.outputs.VERSION }}.apk

      - name: Record reproducible checksums
        run: |
          set -euo pipefail
          APK="android/app/build/outputs/apk/release/muajjin-${VERSION}.apk"
          CHECKSUM_FILE="reproducible-checksums.txt"

          : > "$CHECKSUM_FILE"
          printf "APK\n" >> "$CHECKSUM_FILE"
          sha256sum "$APK" >> "$CHECKSUM_FILE"
          sha512sum "$APK" >> "$CHECKSUM_FILE"

          if [[ -d dist ]]; then
            printf "\nWeb bundle\n" >> "$CHECKSUM_FILE"
            find dist -type f -print0 | sort -z | xargs -0 sha256sum >> "$CHECKSUM_FILE"
          fi

          cat >> "$CHECKSUM_FILE" << EOF

          Build Metadata
          SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}
          BUILD_MODE=github
          GIT_TAG=${RELEASE_TAG}
          EOF
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          files: |
            ./android/app/build/outputs/apk/release/muajjin-${{ steps.get_version.outputs.VERSION }}.apk
            ./reproducible-checksums.txt
